<html>

<head>
  <title>Home Page</title>
</head>

<body>
  <header>
    <h1>Welcome to Home Page</h1>
    <p>Log in to our page to get more information</p>
  </header>

  <div class="login">
    <form action="/details" method="post" enctype="multipart/form-data">
      <div>
        <label for="username">User Name</label>
        <input type="text" id="username" name="username" placeholder="Username" required>
      </div>
      <div>
        <label for="email">Email</label>
        <input type="text" id="email" name="email" placeholder="Enail ID" required>
      </div>
      <div>
        <label for="password">Password</label>
        <input type="text" id="password" name="password" placeholder="Password" required minlength="8">
      </div>
      <div>
        <label for="image">Upload Image</label>
        <input type="file" id="image" name="image" required>
      </div>
      <button type="submit">submit</button>
    </form>
  </div>
</body>

</html>
